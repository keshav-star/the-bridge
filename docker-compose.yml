services:
  # ──────────────────────────────────────────────
  # PostgreSQL + pgvector
  # ──────────────────────────────────────────────
  db:
    image: ankane/pgvector:latest
    container_name: bridge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bridge_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bridge_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bridge} -d ${POSTGRES_DB:-bridge_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────
  # FastAPI Backend (uvicorn)
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bridge_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bridge}:${POSTGRES_PASSWORD:-bridge_secret}@db:5432/${POSTGRES_DB:-bridge_db}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-bridge}:${POSTGRES_PASSWORD:-bridge_secret}@db:5432/${POSTGRES_DB:-bridge_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ──────────────────────────────────────────────
  # Next.js Frontend
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bridge_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  pgdata:
    driver: local
